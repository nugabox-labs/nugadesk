services:
  backend:
    build:
      target: dev
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"

  frontend:
    build:
      target: dev
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"

volumes:
  frontend_node_modules:
